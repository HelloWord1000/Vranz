<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-size: 20px;
      z-index: 2;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="overlay">Tocca per avviare</div>

  <video id="video" loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");

    overlay.addEventListener("click", async () => {
      overlay.style.display = "none";

      try {
        await video.requestFullscreen();
      } catch (e) {}

      video.muted = false;
      video.play();
    });
  </script>

</body>
</html>
