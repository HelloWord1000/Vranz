<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    #playButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 70px;
      color: white;
      cursor: pointer;
      z-index: 10;
      user-select: none;
      text-shadow: 0 0 10px black;
    }
  </style>
</head>

<body>

<div class="container">
  <video id="video" loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <div id="playButton">▶</div>
</div>

<script>
  const video = document.getElementById("video");
  const btn = document.getElementById("playButton");

  btn.addEventListener("click", async () => {
    try {
      video.muted = false;
      await video.play();
      btn.style.display = "none";
    } catch (e) {
      console.log("Errore:", e);
    }
  });
</script>

</body>
</html>
