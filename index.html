<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-size: 20px;
      z-index: 999;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="overlay">TOCCA PER AVVIARE</div>

<video id="video" loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("video");
  const overlay = document.getElementById("overlay");

  async function startVideo() {
    overlay.style.display = "none";

    try {
      // IMPORTANTE: play subito dentro il gesto utente
      await video.play();

      // audio dopo play (più compatibile)
      video.muted = false;

    } catch (err) {
      console.log("Autoplay bloccato:", err);

      // fallback sicuro
      video.muted = true;
      await video.play();
    }

    // fullscreen (opzionale)
    try {
      await video.requestFullscreen();
    } catch (e) {}
  }

  overlay.addEventListener("click", startVideo);
</script>

</body>
</html>
