<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }

    #tap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-family: sans-serif;
      background: black;
      z-index: 10;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="tap">Tocca per avviare il video</div>

<video id="video" loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("video");
  const tap = document.getElementById("tap");

  tap.addEventListener("click", async () => {
    tap.style.display = "none";

    try {
      await video.requestFullscreen();
    } catch (e) {}

    video.muted = false;
    video.play();
  });
</script>

</body>
</html>
