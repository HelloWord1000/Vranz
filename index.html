<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    video {
      height: 100vh;
      width: auto;
      max-width: 100vw;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

  <video id="video" controls playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById("video");

    // tenta autoplay (ma browser spesso lo blocca)
    video.play().catch(() => {});

    // clic → audio sicuro
    video.addEventListener("click", () => {
      video.muted = false;
      video.play();
    });
  </script>

</body>
</html>
